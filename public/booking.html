<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đặt Phòng — Soluna Dalat Hotel</title>
  <link rel="stylesheet" type="text/css" href="//book.securebookings.net/css/app-v2.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #F0EBE1;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      padding: 48px 16px 80px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .back-link {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #3D6335;
      text-decoration: none;
      border-bottom: 1px solid rgba(61,99,53,0.3);
      padding-bottom: 2px;
      margin-bottom: 28px;
    }

    .back-link:hover { border-color: #3D6335; }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(61,99,53,0.5);
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      color: #3D6335;
      font-weight: 400;
      letter-spacing: 0.02em;
      margin-bottom: 0;
    }

    .divider {
      width: 48px;
      height: 1px;
      background-color: #C9A84C;
      margin: 20px auto 0;
    }

    .widget-wrapper {
      max-width: 960px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="/" class="back-link">← Quay Lại Trang Chủ</a>
    <p class="eyebrow">Đặt Phòng Trực Tiếp</p>
    <h1>Xác Nhận Lưu Trú</h1>
    <div class="divider"></div>
  </div>

  <div class="widget-wrapper">
    <div class="hbe-bws">
      <section id="hbe-bws-page">
        <div id="hbe-bws-wrapper"></div>
      </section>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var core = document.createElement('script');
      core.src = 'https://book.securebookings.net/js/v2/widget.all.js';
      core.onload = function () {
        var customize = document.createElement('script');
        customize.src = 'https://book.securebookings.net/widgetCustomize?lang=en&widgetType=Facebook&id=bb6137f3-5427-1775699848-4543-9cd1-273ccd5d236a&ajax=true';
        document.body.appendChild(customize);
      };
      document.body.appendChild(core);
    });
  </script>

</body>
</html>
